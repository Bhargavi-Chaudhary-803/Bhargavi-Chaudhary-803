name: Generate Snake

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: Bhargavi-Chaudhary-803
          outputs: |
            dist/github-snake.svg?color_snake=%234D8B31&color_dots=%23EEE0CB,%23d6e2c8,%23a9c58f,%2379a95c,%234D8B31
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%234D8B31&color_dots=%23000000,%231a2a12,%232f4d1f,%234D8B31,%23EEE0CB

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
